<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeplate - Tool 1</title>
    <link rel="icon" type="image/png" href="/logo_v5.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           Estilos Generales y Reseteo
           ========================================================================== */
        body {
            margin: 0;
            font-family: 'Poppins', Arial, sans-serif;
            overflow-x: hidden;
            background-color: #0a2239;
        }

        #main-container {
            width: 100%;
            min-height: 100vh;
            background-color: #0a2239;
            display: flex;
            flex-direction: column;
            transition: background 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ==========================================================================
           Header (Fijo y Responsivo)
           ========================================================================== */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(88, 89, 92, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        #branding {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: unset;
            flex-shrink: 0;
        }

        #branding h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Montserrat', sans-serif;
            position: relative;
            letter-spacing: 0.5px;
        }

        #branding h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #a6ff00;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(166, 255, 0, 0.6);
        }

        #logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #logo-link:hover {
            transform: scale(1.08);
        }

        #logo {
            width: 60px;
            height: auto;
            user-select: none;
            pointer-events: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ==========================================================================
           Botones de Acción (Animaciones Micro-interacciones)
           ========================================================================== */
        #add-box-btn,
        #add-line-box-btn,
        #settings-btn {
            font-family: 'Poppins', sans-serif;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        #add-box-btn {
            font-size: 22px;
            background-color: #ffffff;
            color: #000000;
            border-radius: 12px;
            width: 46px;
            height: 46px;
        }

        #add-box-btn:hover {
            background-color: #e5e5e5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        #add-line-box-btn {
            font-size: 20px;
            background-color: #000000;
            color: #ffffff;
            border-radius: 10px;
            width: 38px;
            height: 38px;
        }

        #add-line-box-btn:hover {
            background-color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        #settings-btn {
            font-size: 22px;
            background-color: transparent;
            color: #ffffff;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            box-shadow: none;
        }

        #settings-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: rotate(45deg);
        }

        #add-box-btn:active,
        #add-line-box-btn:active {
            transform: translateY(1px);
        }

        /* ==========================================================================
           Workspace y Contenedores (Efectos de entrada)
           ========================================================================== */
        #workspace {
            flex: 1;
            position: relative;
            padding: 20px;
            min-height: calc(100vh - 70px);
            box-sizing: border-box;
        }

        @keyframes boxEntrance {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .box,
        .line-box {
            animation: boxEntrance 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            will-change: transform, top, left;
            transition: box-shadow 0.25s ease, background-color 0.3s ease;
        }

        .box {
            width: 300px;
            max-width: 90vw;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            position: absolute;
            cursor: grab;
            background-color: #a1a1a1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .box:hover:not(.locked) {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .box:active:not(.locked) {
            cursor: grabbing;
        }

        .line-box {
            width: 260px;
            max-width: 85vw;
            height: auto;
            min-height: 40px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25);
            position: absolute;
            cursor: grab;
            background-color: #ffffff;
            border: 1px solid #000000;
        }

        /* Textareas */
        .box textarea,
        .line-box textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            transition: background-color 0.25s ease, border-color 0.25s ease;
        }

        .box textarea {
            resize: none;
            overflow: hidden;
            border-radius: 8px;
            height: auto;
            padding: 8px;
            background-color: #e9e7e7;
            font-size: 15px;
            font-weight: bold;
            border: 1px solid transparent;
        }

        .box textarea:focus {
            outline: none;
            background-color: #ffffff;
            border-color: #a6ff00;
        }

        .line-box textarea {
            resize: none;
            overflow: hidden;
            height: 24px !important;
            border: none;
            background-color: inherit;
            font-size: 14px;
            padding: 2px 5px;
            font-weight: 500;
        }

        .line-box textarea:focus {
            outline: none;
        }

        /* Botoneras internas */
        .box-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 6px;
        }

        .box button,
        .line-box button {
            padding: 6px 12px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .box button:hover,
        .line-box button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .box button:active,
        .line-box button:active {
            transform: scale(0.95);
        }

        .box .copy-btn {
            flex-grow: 1;
            padding: 8px;
            background-color: black;
            color: white;
            cursor: copy;
            font-size: 15px;
        }

        .box .delete-btn {
            background-color: #ff3b30;
            color: white;
            cursor: pointer;
        }

        .box .lock-btn {
            background-color: #f5cb8d;
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            padding: 0;
        }

        .box .lock-btn.active,
        .line-box .lock-btn.active {
            background-color: #e0a847;
            color: white;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .line-box-buttons {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            justify-content: flex-end;
        }

        .line-box .color-btn {
            background-color: #bfcfbf;
            color: #2e4a2e;
        }

        .line-box .delete-btn {
            background-color: #f77067;
            color: white;
        }

        .line-box .lock-btn {
            background-color: #f5cb8d;
            color: #333;
        }

        /* ==========================================================================
           Modales y Menús Flotantes (UI Premium)
           ========================================================================== */
        #settings-menu {
            position: absolute;
            background: #080e1f;
            color: white;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 12px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: menuFadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transform-origin: top left;
        }

        @keyframes menuFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-5px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #settings-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        #settings-menu li {
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s ease, transform 0.1s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #settings-menu li:hover {
            background: #2d4263;
        }

        #volume-control,
        #sound-control {
            cursor: default !important;
            flex-direction: column;
            align-items: flex-start !important;
            gap: 6px;
        }

        #volume-control input[type="range"] {
            width: 100%;
            accent-color: #a6ff00;
        }

        #background-options {
            margin-top: 5px;
            border-left: 2px solid #2d4263;
            padding-left: 8px;
        }

        #background-options li {
            font-size: 13px;
            padding: 6px 10px;
        }

        /* Selector de Color Mejorado */
        .color-picker {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 1000;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            padding: 20px;
            width: 280px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .color-picker.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .color-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .color-picker-header h3 {
            margin: 0;
            font-size: 16px;
            color: #333;
        }

        #close-color-picker {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        #close-color-picker:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .color-spectrum {
            width: 100%;
            height: 140px;
            background: linear-gradient(to top, #000, transparent),
                linear-gradient(to right, #fff, transparent);
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: crosshair;
        }

        .color-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #custom-color {
            width: 45px;
            height: 45px;
            border: none;
            cursor: pointer;
            background: transparent;
        }

        .color-preview {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: background-color 0.1s ease;
        }

        .color-picker-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .color-picker-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ==========================================================================
           Animaciones Especiales y Estados de Bloqueo
           ========================================================================== */
        @keyframes neonGlow {
            0% {
                box-shadow: 0 0 0px rgba(255, 255, 255, 0);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 255, 255, 0.9);
            }

            100% {
                box-shadow: 0 0 0px rgba(255, 255, 255, 0);
            }
        }

        /* Modificado: Asegura prioridad máxima de la animación sobre el estado lock */
        .box.glow {
            animation: neonGlow 0.6s ease-out !important;
        }

        .locked {
            cursor: default !important;
            opacity: 0.85;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* ==========================================================================
           Adaptabilidad Responsiva (Móviles / Tablets)
           ========================================================================== */
        @media (max-width: 600px) {
            #header {
                padding: 10px 16px;
            }

            #branding h1 {
                font-size: 20px;
            }

            #logo {
                width: 48px;
            }

            .box {
                width: 280px;
            }

            .line-box {
                width: 220px;
            }
        }
    </style>
</head>

<body>
    <div id="main-container">
        <div id="header">
            <div id="branding">
                <a href="../tools.html" id="logo-link">
                    <img src="/logo_v4.png" alt="Logo de Timeplate" id="logo">
                </a>
                <h1>Pasplate</h1>
            </div>
            <div class="header-actions">
                <button id="add-line-box-btn">+</button>
                <button id="add-box-btn">+</button>
            </div>
        </div>

        <div id="workspace"></div>

        <div id="color-picker" class="color-picker">
            <div class="color-picker-header">
                <h3>Seleccionar color</h3>
                <button id="close-color-picker">×</button>
            </div>
            <div class="color-picker-body">
                <div class="color-spectrum" id="color-spectrum"></div>
                <div class="color-controls">
                    <input type="color" id="custom-color" value="#ffffff">
                    <div class="color-preview" id="color-preview"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const workspace = document.getElementById('workspace');
        const addBoxBtn = document.getElementById('add-box-btn');
        const addLineBoxBtn = document.getElementById('add-line-box-btn');
        const colorPicker = document.getElementById('color-picker');
        const colorSpectrum = document.getElementById('color-spectrum');
        const customColorInput = document.getElementById('custom-color');
        const colorPreview = document.getElementById('color-preview');
        const closeColorPickerBtn = document.getElementById('close-color-picker');

        let currentBoxForColor = null;
        let isMuted = false;

        // ============================
        // AUDIO BASE
        // ============================
        let defaultSound = 'audio_1.mp3';
        let copySound = new Audio(defaultSound);

        // ============================
        // LOAD CUSTOM SOUND
        // ============================
        const savedCustomSound = localStorage.getItem('customSound');
        if (savedCustomSound) {
            copySound.src = savedCustomSound;
        }

        // ============================
        // SETTINGS BUTTON
        // ============================
        const settingsBtn = document.createElement('button');
        settingsBtn.id = 'settings-btn';
        settingsBtn.innerHTML = '⚙️';
        addLineBoxBtn.parentNode.insertBefore(settingsBtn, addLineBoxBtn);

        // ============================
        // SETTINGS MENU
        // ============================
        const settingsMenu = document.createElement('div');
        settingsMenu.id = 'settings-menu';
        settingsMenu.innerHTML = `
        <ul>
            <li id="toggle-mute">🔊 Mute</li>
            <li id="volume-control">
                🔈 Volumen
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </li>
            <li id="sound-control">
                🎵 Sound
                <input type="file" id="sound-upload" accept="audio/*">
                <button id="remove-sound" style="background: #f77067; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 5px;">Eliminar sonido</button>
            </li>
            <li id="background-settings">+ Background</li>
            <ul id="background-options" style="display:none; margin-left:15px;">
                <li data-bg="#0a2239">- Blue</li>
                <li data-bg="#121212">- Gray</li>
                <li data-bg="#0f3d3e">- Green</li>
                <li data-bg="linear-gradient(135deg, #1a1f36, #2d4263)">- Elegant</li>
            </ul>
        </ul>
        `;
        settingsMenu.style.display = 'none';
        document.body.appendChild(settingsMenu);

        // ============================
        // TOGGLE MENU
        // ============================
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.style.display = settingsMenu.style.display === 'block' ? 'none' : 'block';
            const rect = settingsBtn.getBoundingClientRect();
            settingsMenu.style.top = (rect.bottom + window.scrollY) + 'px';
            settingsMenu.style.left = (rect.left - 120) + 'px';
        });

        document.addEventListener('click', () => {
            settingsMenu.style.display = 'none';
        });
        settingsMenu.addEventListener('click', (e) => e.stopPropagation());

        // ============================
        // MUTE
        // ============================
        const toggleMuteOption = document.getElementById('toggle-mute');
        const volumeSlider = document.getElementById('volume-slider');

        toggleMuteOption.addEventListener('click', () => {
            isMuted = !isMuted;
            if (isMuted) {
                copySound.volume = 0;
                volumeSlider.value = 0;
            } else {
                copySound.volume = 1;
                volumeSlider.value = 1;
            }
            toggleMuteOption.textContent = isMuted ? '🔇 <Unmute>' : '🔊 Mute';
            localStorage.setItem('soundVolume', copySound.volume);
        });

        // ============================
        // VOLUME CONTROL
        // ============================
        const savedVolume = localStorage.getItem('soundVolume');
        if (savedVolume !== null) {
            copySound.volume = savedVolume;
            volumeSlider.value = savedVolume;
            if (savedVolume == 0) {
                isMuted = true;
                toggleMuteOption.textContent = '🔇 <Unmute>';
            }
        }

        volumeSlider.addEventListener('input', () => {
            const volume = volumeSlider.value;
            copySound.volume = volume;
            if (volume == 0) {
                isMuted = true;
                toggleMuteOption.textContent = '🔇 <Unmute>';
            } else {
                isMuted = false;
                toggleMuteOption.textContent = '🔊 Mute';
            }
            localStorage.setItem('soundVolume', volume);
        });

        // ============================
        // SOUND UPLOAD (VALIDACIÓN 4MB)
        // ============================
        const soundUpload = document.getElementById('sound-upload');
        const removeSoundBtn = document.getElementById('remove-sound');
        const MAX_SIZE = 4 * 1024 * 1024; // 4MB

        soundUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > MAX_SIZE) {
                alert('El archivo supera el tamaño permitido de 4MB');
                soundUpload.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function (event) {
                const base64Sound = event.target.result;
                copySound.src = base64Sound;
                localStorage.setItem('customSound', base64Sound);
            };
            reader.readAsDataURL(file);
        });

        removeSoundBtn.addEventListener('click', () => {
            localStorage.removeItem('customSound');
            copySound.src = defaultSound;
        });

        // ============================
        // BACKGROUND
        // ============================
        const backgroundSettings = document.getElementById('background-settings');
        const backgroundOptions = document.getElementById('background-options');

        backgroundSettings.addEventListener('click', () => {
            backgroundOptions.style.display = backgroundOptions.style.display === 'block' ? 'none' : 'block';
        });

        backgroundOptions.querySelectorAll('li').forEach(option => {
            option.addEventListener('click', () => {
                const bgValue = option.dataset.bg;
                const mainContainer = document.getElementById('main-container');
                mainContainer.style.background = bgValue;
                localStorage.setItem('selectedBackground', bgValue);
                backgroundOptions.style.display = 'none';
            });
        });

        // ============================
        // DOM READY
        // ============================
        document.addEventListener('DOMContentLoaded', () => {
            const savedBg = localStorage.getItem('selectedBackground');
            if (savedBg) {
                document.getElementById('main-container').style.background = savedBg;
            }
            loadBoxes();
            loadLineBoxes();
        });

        // ============================
        // + BUTTONS
        // ============================
        addBoxBtn.addEventListener('click', () => {
            createBox({ text: '', left: '50px', top: '100px', locked: 'false' });
            saveBoxes();
        });

        addLineBoxBtn.addEventListener('click', () => {
            createLineBox({
                text: '',
                left: '50px',
                top: '100px',
                color: '#ffffff',
                locked: 'false'
            });
            saveLineBoxes();
        });

        // ============================
        // CREATE BOX
        // ============================
        function createBox(data) {
            const box = document.createElement('div');
            box.classList.add('box');
            box.style.left = data.left;
            box.style.top = data.top;

            const textarea = document.createElement('textarea');
            textarea.placeholder = 'Texto...';
            textarea.value = data.text;
            box.dataset.locked = data.locked || 'false';

            textarea.addEventListener('input', () => {
                textarea.style.height = 'auto';
                textarea.style.height = `${textarea.scrollHeight}px`;
                saveBoxes();
            });

            const buttonsDiv = document.createElement('div');
            buttonsDiv.classList.add('box-buttons');

            const copyBtn = document.createElement('button');
            copyBtn.classList.add('copy-btn');
            copyBtn.textContent = '+';
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(textarea.value);
                if (!isMuted) {
                    copySound.currentTime = 0;
                    copySound.play().catch(e => console.log("Audio play prevented"));
                }
                box.classList.remove('glow');
                void box.offsetWidth; // Trigger reflow
                box.classList.add('glow');
            });

            const lockBtn = document.createElement('button');
            lockBtn.classList.add('lock-btn');
            lockBtn.textContent = '🔒';
            lockBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isLocked = box.dataset.locked === 'true';
                box.dataset.locked = !isLocked;
                if (!isLocked) {
                    box.classList.add('locked');
                    lockBtn.classList.add('active');
                } else {
                    box.classList.remove('locked');
                    lockBtn.classList.remove('active');
                }
                saveBoxes();
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.textContent = '-';
            deleteBtn.addEventListener('click', () => {
                const confirmDelete = confirm('¿Eliminar este recuadro?');
                if (confirmDelete) {
                    workspace.removeChild(box);
                    saveBoxes();
                }
            });

            buttonsDiv.appendChild(copyBtn);
            buttonsDiv.appendChild(lockBtn);
            buttonsDiv.appendChild(deleteBtn);
            box.appendChild(textarea);
            box.appendChild(buttonsDiv);
            workspace.appendChild(box);

            if (box.dataset.locked === 'true') {
                box.classList.add('locked');
                lockBtn.classList.add('active');
            }

            textarea.style.height = `${textarea.scrollHeight}px`;
            makeDraggable(box);
        }

        // ============================
        // CREATE LINE BOX
        // ============================
        function createLineBox(data) {
            const box = document.createElement('div');
            box.classList.add('line-box');
            box.style.left = data.left;
            box.style.top = data.top;
            box.style.backgroundColor = data.color;
            box.dataset.locked = data.locked || 'false';

            if (data.locked === 'true') {
                box.classList.add('locked');
            }

            const textarea = document.createElement('textarea');
            textarea.placeholder = 'Texto...';
            textarea.value = data.text;

            textarea.addEventListener('input', () => {
                saveLineBoxes();
            });

            const buttonsDiv = document.createElement('div');
            buttonsDiv.classList.add('line-box-buttons');

            const colorBtn = document.createElement('button');
            colorBtn.classList.add('color-btn');
            colorBtn.textContent = '🎨';
            colorBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentBoxForColor = box;
                showColorPicker();
            });

            const lockBtn = document.createElement('button');
            lockBtn.classList.add('lock-btn');
            lockBtn.textContent = '🔒';
            if (data.locked === 'true') {
                lockBtn.classList.add('active');
            }
            lockBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isLocked = box.dataset.locked === 'true';
                box.dataset.locked = !isLocked;
                if (!isLocked) {
                    box.classList.add('locked');
                    lockBtn.classList.add('active');
                } else {
                    box.classList.remove('locked');
                    lockBtn.classList.remove('active');
                }
                saveLineBoxes();
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.textContent = 'X';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const confirmDelete = confirm('¿Eliminar este recuadro?');
                if (confirmDelete) {
                    workspace.removeChild(box);
                    saveLineBoxes();
                }
            });

            buttonsDiv.appendChild(colorBtn);
            buttonsDiv.appendChild(lockBtn);
            buttonsDiv.appendChild(deleteBtn);

            box.appendChild(textarea);
            box.appendChild(buttonsDiv);
            workspace.appendChild(box);

            makeDraggable(box);
        }

        // ============================
        // DRAG
        // ============================
        function makeDraggable(element) {
            let offsetX, offsetY;

            const startDrag = (clientX, clientY, target) => {
                if (target.tagName === 'TEXTAREA' || target.tagName === 'BUTTON' || element.classList.contains('locked')) return;

                offsetX = clientX - element.offsetLeft;
                offsetY = clientY - element.offsetTop;

                const moveAt = (moveX, moveY) => {
                    element.style.left = `${moveX - offsetX}px`;
                    element.style.top = `${moveY - offsetY}px`;
                };

                const onMouseMove = (e) => moveAt(e.clientX, e.clientY);
                const onTouchMove = (e) => {
                    if (e.touches.length > 0) moveAt(e.touches[0].clientX, e.touches[0].clientY);
                };

                const stopDrag = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('touchmove', onTouchMove);
                    if (element.classList.contains('box')) {
                        saveBoxes();
                    } else {
                        saveLineBoxes();
                    }
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('touchmove', onTouchMove, { passive: false });
                document.addEventListener('mouseup', stopDrag, { once: true });
                document.addEventListener('touchend', stopDrag, { once: true });
            };

            element.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY, e.target));
            element.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) startDrag(e.touches[0].clientX, e.touches[0].clientY, e.target);
            }, { passive: true });
        }

        // ============================
        // COLOR PICKER MEJORADO
        // ============================
        let backdrop = null;

        function showColorPicker() {
            if (!backdrop) {
                backdrop = document.createElement('div');
                backdrop.classList.add('color-picker-backdrop');
                document.body.appendChild(backdrop);
                backdrop.addEventListener('click', closeColorPicker);
            }

            setTimeout(() => {
                backdrop.classList.add('active');
                colorPicker.classList.add('active');
            }, 10);
        }

        function closeColorPicker() {
            if (backdrop) backdrop.classList.remove('active');
            colorPicker.classList.remove('active');
        }

        closeColorPickerBtn.addEventListener('click', closeColorPicker);

        colorSpectrum.addEventListener('click', (e) => {
            if (!currentBoxForColor) return;

            const rect = colorSpectrum.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const hue = (x / rect.width) * 360;
            const saturation = 100;
            const lightness = 100 - (y / rect.height) * 100;

            const color = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            applyColor(color);
        });

        customColorInput.addEventListener('input', () => {
            applyColor(customColorInput.value);
        });

        function applyColor(color) {
            if (!currentBoxForColor) return;

            currentBoxForColor.style.backgroundColor = color;
            currentBoxForColor.querySelector('textarea').style.backgroundColor = color;
            colorPreview.style.backgroundColor = color;
            saveLineBoxes();
        }

        // ============================
        // SAVE / LOAD
        // ============================
        function saveBoxes() {
            const boxes = Array.from(workspace.querySelectorAll('.box')).map(box => ({
                text: box.querySelector('textarea').value,
                left: box.style.left,
                top: box.style.top,
                locked: box.dataset.locked
            }));
            localStorage.setItem('boxes', JSON.stringify(boxes));
        }

        function loadBoxes() {
            const savedBoxes = JSON.parse(localStorage.getItem('boxes') || '[]');
            savedBoxes.forEach(data => createBox(data));
        }

        function saveLineBoxes() {
            const lineBoxes = Array.from(workspace.querySelectorAll('.line-box')).map(box => ({
                text: box.querySelector('textarea').value,
                left: box.style.left,
                top: box.style.top,
                color: box.style.backgroundColor,
                locked: box.dataset.locked
            }));
            localStorage.setItem('lineBoxes', JSON.stringify(lineBoxes));
        }

        function loadLineBoxes() {
            const savedLineBoxes = JSON.parse(localStorage.getItem('lineBoxes') || '[]');
            savedLineBoxes.forEach(data => createLineBox(data));
        }
    </script>
</body>
