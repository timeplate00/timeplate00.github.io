<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeplate - Tool 1</title>
    <link rel="icon" type="image/png" href="/logo_v5.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #0a2239;
            background-attachment: fixed;
            min-height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, .2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .2);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(166, 255, 0, .6);
            box-shadow: 0 0 8px rgba(166, 255, 0, .4);
        }

        #main-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #app-body {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        #content-area {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: auto;
            position: relative;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(88, 89, 92, .65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .2);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all .3s ease;
            flex-shrink: 0;
            height: 60px;
            box-sizing: border-box;
        }

        #branding {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: unset;
            flex-shrink: 0;
        }

        #branding h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, .9);
            font-family: 'Montserrat', sans-serif;
            position: relative;
            letter-spacing: .5px;
        }

        #branding h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #a6ff00;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(166, 255, 0, .6);
        }

        #logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: transform .3s cubic-bezier(.175, .885, .32, 1.275);
        }

        #logo-link:hover {
            transform: scale(1.08);
        }

        #logo {
            width: 60px;
            height: auto;
            user-select: none;
            pointer-events: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #sidebar {
            width: 70px;
            background: rgba(20, 35, 55, .6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, .08);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
            flex-shrink: 0;
            z-index: 98;
            box-shadow: 4px 0 15px rgba(0, 0, 0, .15);
            transition: width .35s cubic-bezier(.25, 1, .5, 1), padding .35s ease, border-color .35s ease;
            overflow: hidden;
        }

        #sidebar.collapsed {
            width: 0;
            padding-left: 0;
            padding-right: 0;
            border-right-color: transparent;
        }

        .sidebar-section-title {
            font-size: 10px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .4);
            letter-spacing: 1px;
            margin-bottom: -10px;
            font-weight: 700;
            user-select: none;
            transition: opacity .2s ease;
        }

        #sidebar.collapsed .sidebar-section-title,
        #sidebar.collapsed button {
            opacity: 0;
            pointer-events: none;
        }

        #toggle-sidebar-btn {
            background: rgba(255, 255, 255, .1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, .15);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all .2s ease;
        }

        #toggle-sidebar-btn:hover {
            background: #a6ff00;
            color: #000;
            box-shadow: 0 0 10px rgba(166, 255, 0, .5);
            border-color: transparent;
        }

        #boards-bar {
            display: flex;
            align-items: center;
            background: rgba(20, 35, 55, .4);
            padding: 6px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            gap: 8px;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 97;
            flex-shrink: 0;
            height: 46px;
            box-sizing: border-box;
        }

        #add-board-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, .2);
            flex-shrink: 0;
        }

        #add-board-btn:hover:not(:disabled) {
            background: #e5e5e5;
            transform: scale(1.05);
        }

        #add-board-btn:disabled {
            background: #4a5568;
            color: #718096;
            cursor: not-allowed;
            box-shadow: none;
        }

        #boards-container {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #boards-container::-webkit-scrollbar {
            display: none;
        }

        .board-tab {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, .1);
            color: rgba(255, 255, 255, .7);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s cubic-bezier(.4, 0, .2, 1);
            border: 1px solid transparent;
            gap: 8px;
            animation: tabEntrance .3s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }

        @keyframes tabEntrance {
            from {
                opacity: 0;
                transform: scale(.8) translateY(-5px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .board-tab.animation-exit {
            animation: tabExit .25s ease forwards !important;
        }

        @keyframes tabExit {
            from {
                opacity: 1;
                transform: scale(1);
                width: var(--tab-width, auto);
                padding-left: 14px;
                padding-right: 14px;
                margin-right: 6px;
            }

            to {
                opacity: 0;
                transform: scale(.8);
                width: 0;
                padding-left: 0;
                padding-right: 0;
                margin-right: 0;
                visibility: hidden;
            }
        }

        .board-tab:hover {
            background: rgba(255, 255, 255, .18);
            color: #fff;
        }

        .board-tab.active {
            background: #a6ff00;
            color: #000;
            box-shadow: 0 0 12px rgba(166, 255, 0, .4);
        }

        .board-tab .close-board-btn {
            background: transparent;
            border: none;
            color: inherit;
            font-size: 14px;
            cursor: pointer;
            padding: 0 2px;
            border-radius: 4px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s;
        }

        .board-tab .close-board-btn:hover {
            background: rgba(0, 0, 0, .15);
        }

        .board-tab.active .close-board-btn:hover {
            background: rgba(0, 0, 0, .1);
        }

        #add-box-btn,
        #add-line-box-btn,
        #settings-btn {
            font-family: 'Poppins', sans-serif;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all .25s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
        }

        #add-box-btn {
            font-size: 22px;
            background-color: #fff;
            color: #000;
            border-radius: 12px;
            width: 46px;
            height: 46px;
        }

        #add-box-btn:hover {
            background-color: #e5e5e5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, .2);
        }

        #add-line-box-btn {
            font-size: 20px;
            background-color: #000;
            color: #fff;
            border-radius: 10px;
            width: 38px;
            height: 38px;
        }

        #add-line-box-btn:hover {
            background-color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, .4);
        }

        #settings-btn {
            font-size: 22px;
            background-color: transparent;
            color: #fff;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            box-shadow: none;
        }

        #settings-btn:hover {
            background-color: rgba(255, 255, 255, .15);
            transform: rotate(45deg);
        }

        #workspace {
            position: relative;
            width: 3000px;
            height: 3000px;
            padding: 40px;
            box-sizing: border-box;
        }

        .box,
        .line-box {
            animation: boxEntrance .3s cubic-bezier(.34, 1.56, .64, 1) forwards;
            will-change: transform, top, left;
            transition: box-shadow .25s ease, background-color .3s ease;
        }

        @keyframes boxEntrance {
            from {
                opacity: 0;
                transform: scale(.9) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .box {
            width: 300px;
            max-width: 90vw;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .35);
            position: absolute;
            cursor: grab;
            background-color: #a1a1a1;
            border: 1px solid rgba(255, 255, 255, .1);
        }

        .box:hover:not(.locked) {
            box-shadow: 0 15px 30px rgba(0, 0, 0, .5);
        }

        .box:active:not(.locked) {
            cursor: grabbing;
        }

        .line-box {
            width: 260px;
            max-width: 85vw;
            height: auto;
            min-height: 40px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, .25);
            position: absolute;
            cursor: grab;
            background-color: #fff;
            border: 1px solid #000;
        }

        .box textarea,
        .line-box textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            transition: background-color .25s ease, border-color .25s ease;
        }

        .box textarea {
            resize: none;
            overflow: hidden;
            border-radius: 8px;
            height: auto;
            padding: 8px;
            background-color: #e9e7e7;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .box textarea:focus {
            outline: none;
            background-color: #fff;
            border-color: #a6ff00;
        }

        .line-box textarea {
            resize: none;
            overflow: hidden;
            height: 24px !important;
            border: none;
            background-color: inherit;
            font-size: 14px;
            padding: 2px 5px;
            font-weight: 500;
        }

        .line-box textarea:focus {
            outline: none;
        }

        .box-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 6px;
        }

        .box button,
        .line-box button {
            padding: 6px 12px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all .2s ease;
        }

        .box button:hover,
        .line-box button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .box button:active,
        .line-box button:active {
            transform: scale(.95);
        }

        .box .copy-btn {
            flex-grow: 1;
            padding: 8px;
            background-color: #000;
            color: #fff;
            cursor: copy;
            font-size: 15px;
        }

        .box .delete-btn {
            background-color: #ff3b30;
            color: #fff;
            cursor: pointer;
        }

        .box .lock-btn {
            background-color: #f5cb8d;
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            padding: 0;
        }

        .box .lock-btn.active,
        .line-box .lock-btn.active {
            background-color: #e0a847;
            color: #fff;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, .2);
        }

        .line-box-buttons {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            justify-content: flex-end;
        }

        .line-box .color-btn {
            background-color: #bfcfbf;
            color: #2e4a2e;
        }

        .line-box .delete-btn {
            background-color: #f77067;
            color: #fff;
        }

        .line-box .lock-btn {
            background-color: #f5cb8d;
            color: #333;
        }

        #settings-menu {
            position: fixed;
            background: #080e1f;
            color: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
            padding: 12px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, .08);
            animation: menuFadeIn .2s cubic-bezier(0.4, 0, .2, 1) forwards;
            transform-origin: top left;
            width: 200px;
        }

        @keyframes menuFadeIn {
            from {
                opacity: 0;
                transform: scale(.95) translateY(-5px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #settings-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        #settings-menu li {
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: background .2s ease, transform .1s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #settings-menu li:hover {
            background: #2d4263;
        }

        #background-settings:hover,
        #organized-control:hover,
        #sound-control:hover,
        #volume-control:hover {
            background: transparent !important;
        }

        #background-settings,
        #organized-control,
        #sound-control,
        #volume-control {
            cursor: pointer;
        }

        #organized-control,
        #sound-control,
        #volume-control {
            cursor: default !important;
            flex-direction: column;
            align-items: flex-start !important;
            gap: 6px;
        }

        #volume-control input[type=range] {
            width: 100%;
            accent-color: #a6ff00;
        }

        #background-options,
        #organized-options {
            margin-top: 5px;
            border-left: 2px solid #2d4263;
            padding-left: 8px;
            width: 100%;
            box-sizing: border-box;
            list-style: none;
        }

        #background-options li,
        #organized-options li {
            font-size: 13px !important;
            padding: 8px 10px !important;
            display: block !important;
            cursor: pointer !important;
            border-radius: 6px !important;
            background: transparent !important;
            transition: background .2s ease !important;
            color: rgba(255, 255, 255, .85);
        }

        #background-options li:hover,
        #organized-options li:hover {
            background: #2d4263 !important;
            color: #fff !important;
        }

        .color-picker {
            position: absolute;
            z-index: 1005;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .3);
            padding: 14px;
            width: 210px;
            opacity: 0;
            pointer-events: none;
            transform: scale(.95);
            transition: opacity .15s ease, transform .15s ease;
            border: 1px solid rgba(0, 0, 0, .1);
        }

        .color-picker.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .color-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .color-picker-header h3 {
            margin: 0;
            font-size: 13px;
            color: #4a5568;
            font-weight: 600;
        }

        #close-color-picker {
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #a0aec0;
            line-height: 1;
            padding: 0;
        }

        #close-color-picker:hover {
            color: #4a5568;
        }

        .color-presets-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .color-preset-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, .12);
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .color-preset-circle:hover {
            transform: scale(1.12);
            box-shadow: 0 2px 6px rgba(0, 0, 0, .15);
        }

        .color-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #edf2f7;
            padding-top: 10px;
            gap: 10px;
        }

        .color-controls span {
            font-size: 11px;
            color: #718096;
            font-weight: 500;
        }

        #custom-color {
            width: 34px;
            height: 34px;
            border: none;
            cursor: pointer;
            background: transparent;
            padding: 0;
        }

        .color-preview {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
        }

        .color-picker-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent;
            z-index: 1004;
            display: none;
        }

        .color-picker-backdrop.active {
            display: block;
        }

        .confirm-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(.9);
            z-index: 2000;
            background: #080e1f;
            color: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .6);
            padding: 24px;
            width: 340px;
            opacity: 0;
            pointer-events: none;
            transition: all .25s cubic-bezier(0.4, 0, .2, 1);
            border: 1px solid rgba(255, 255, 255, .1);
            text-align: center;
        }

        .confirm-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        @keyframes alertPulse {
            0% {
                border-color: rgba(255, 255, 255, .1);
                box-shadow: 0 20px 50px rgba(0, 0, 0, .6);
            }

            50% {
                border-color: #ff3b30;
                box-shadow: 0 0 25px rgba(255, 59, 48, .6), 0 20px 50px rgba(0, 0, 0, .6);
            }

            100% {
                border-color: rgba(255, 255, 255, .1);
                box-shadow: 0 20px 50px rgba(0, 0, 0, .6);
            }
        }

        .confirm-modal.pulse-danger {
            animation: alertPulse 1.2s infinite ease-in-out;
        }

        .confirm-modal h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
            font-family: 'Montserrat', sans-serif;
            word-wrap: break-word;
        }

        .confirm-modal p {
            margin: 0 0 20px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, .7);
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .confirm-buttons button {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all .2s;
            min-width: 80px;
        }

        .confirm-btn-yes {
            background: #a6ff00;
            color: #000;
        }

        .confirm-btn-yes.danger {
            background: #ff3b30;
            color: #fff;
        }

        .confirm-btn-no {
            background: rgba(255, 255, 255, .15);
            color: #fff;
        }

        .confirm-buttons button:hover {
            filter: brightness(1.1);
            transform: scale(1.03);
        }

        @keyframes neonGlow {
            0% {
                box-shadow: 0 0 0 rgba(166, 255, 0, 0);
            }

            50% {
                box-shadow: 0 0 25px rgba(166, 255, 0, .9);
                border-color: #a6ff00;
            }

            100% {
                box-shadow: 0 0 0 rgba(166, 255, 0, 0);
            }
        }

        .box.glow {
            animation: neonGlow .6s ease-out !important;
        }

        .locked {
            cursor: default !important;
            opacity: .85;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .2);
        }

        @media (max-width: 600px) {
            #header {
                padding: 10px 16px;
            }

            #branding h1 {
                font-size: 20px;
            }

            #logo {
                width: 48px;
            }

            #sidebar {
                width: 60px;
                padding: 15px 0;
                gap: 15px;
            }

            #sidebar.collapsed {
                width: 0;
            }

            #add-box-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            #add-line-box-btn {
                width: 34px;
                height: 34px;
                font-size: 16px;
            }

            .box {
                width: 280px;
            }

            .line-box {
                width: 220px;
            }
        }
    </style>
</head>

<body>
    <div id="main-container">
        <div id="header">
            <div id="branding">
                <button id="toggle-sidebar-btn" title="Mostrar/Ocultar Menú Lateral">◀</button>
                <a href="../tools.html" id="logo-link">
                    <img src="/logo_v4.png" alt="Logo de Timeplate" id="logo">
                </a>
                <h1>Pasplate</h1>
            </div>
            <div class="header-actions">
                <button id="settings-btn">⚙️</button>
            </div>
        </div>
        <div id="app-body">
            <div id="sidebar">
                <span class="sidebar-section-title">Add</span>
                <button id="add-box-btn" title="Agregar Recuadro">+</button>
                <button id="add-line-box-btn" title="Agregar LineBox">+</button>
            </div>
            <div id="content-area">
                <div id="boards-bar">
                    <button id="add-board-btn">+</button>
                    <div id="boards-container"></div>
                </div>
                <div id="workspace"></div>
            </div>
        </div>
        <div id="color-picker" class="color-picker">
            <div class="color-picker-header">
                <h3>Colores</h3>
                <button id="close-color-picker">×</button>
            </div>
            <div class="color-presets-grid" id="color-presets-grid"></div>
            <div class="color-controls">
                <span>Personalizado:</span>
                <input type="color" id="custom-color" value="#ffffff">
                <div class="color-preview" id="color-preview"></div>
            </div>
        </div>
        <div id="custom-confirm" class="confirm-modal">
            <h3 id="confirm-title">¿Eliminar?</h3>
            <p id="confirm-msg">Esta acción no se puede deshacer.</p>
            <div class="confirm-buttons">
                <button id="confirm-yes" class="confirm-btn-yes">Sí</button>
                <button id="confirm-no" class="confirm-btn-no">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // Bloqueo de Clic Derecho e Inspección de Interfaz Superficial
            document.addEventListener("contextmenu", function (event) {
                event.preventDefault();
            });
            document.addEventListener("keydown", function (event) {
                if (event.key === "F12" ||
                    (event.ctrlKey && event.shiftKey && (event.key === "I" || event.key === "J" || event.key === "C")) ||
                    (event.ctrlKey && event.key === "u") ||
                    (event.metaKey && event.altKey && event.key === "i")) {
                    event.preventDefault();
                }
            });

            // Elementos del DOM del Espacio de Trabajo
            const workspace = document.getElementById("workspace");
            const contentArea = document.getElementById("content-area");
            const sidebar = document.getElementById("sidebar");
            const toggleSidebarBtn = document.getElementById("toggle-sidebar-btn");
            const addBoxBtn = document.getElementById("add-box-btn");
            const addLineBoxBtn = document.getElementById("add-line-box-btn");
            const colorPicker = document.getElementById("color-picker");
            const colorPresetsGrid = document.getElementById("color-presets-grid");
            const customColorInput = document.getElementById("custom-color");
            const colorPreview = document.getElementById("color-preview");
            const closeColorPickerBtn = document.getElementById("close-color-picker");
            const boardsContainer = document.getElementById("boards-container");
            const addBoardBtn = document.getElementById("add-board-btn");
            const customConfirmModal = document.getElementById("custom-confirm");
            const confirmYesBtn = document.getElementById("confirm-yes");
            const confirmNoBtn = document.getElementById("confirm-no");

            // Variables de Estado
            let activeLineBox = null;
            let isMuted = false;
            let activeBoardId = 1;
            let boardsList = [1];

            // Gestión de Menú Lateral (Sidebar)
            toggleSidebarBtn.addEventListener("click", () => {
                const isCollapsed = sidebar.classList.toggle("collapsed");
                toggleSidebarBtn.textContent = isCollapsed ? "▶" : "◀";
                localStorage.setItem("sidebarCollapsed", isCollapsed);
            });

            function initSidebarState() {
                const isCollapsed = localStorage.getItem("sidebarCollapsed") === "true";
                if (isCollapsed) {
                    sidebar.classList.add("collapsed");
                    toggleSidebarBtn.textContent = "▶";
                } else {
                    sidebar.classList.remove("collapsed");
                    toggleSidebarBtn.textContent = "◀";
                }
            }

            // Configuración del Sistema de Audio y Menú de Ajustes
            let defaultSoundPath = "audio_1.mp3";
            let audioFeedback = new Audio(defaultSoundPath);

            const savedCustomSound = localStorage.getItem("customSound");
            if (savedCustomSound) audioFeedback.src = savedCustomSound;

            const settingsBtn = document.getElementById("settings-btn");
            const settingsMenu = document.createElement("div");

            settingsMenu.id = "settings-menu";
            settingsMenu.innerHTML = `<ul>
                <li id="toggle-mute">🔊 Mute</li>
                <li id="volume-control">🔈 Volume <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1"></li>
                <li id="sound-control">🎵 Sound <input type="file" id="sound-upload" accept="audio/*"> <button id="remove-sound" style="background: #f77067; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 5px;">Delete sound</button></li>
                <li id="organized-control"><span id="organized-trigger" style="cursor:pointer; display:block; width:100%;">+ Boxes Organized</span>
                    <ul id="organized-options" style="display:none;"><li data-action="template">- Template boxes</li><li data-action="color">- Color boxes</li><li data-action="empty">- Empty boxes</li></ul>
                </li>
                <li id="background-settings">+ Background</li>
                <ul id="background-options" style="display:none; margin-left:15px;">
                    <li data-bg="#0a2239">- Blue</li><li data-bg="#121212">- Gray</li><li data-bg="#0f3d3e">- Green</li><li data-bg="linear-gradient(135deg, #1a1f36, #2d4263)">- Elegant</li>
                </ul>
            </ul>`;
            settingsMenu.style.display = "none";
            document.body.appendChild(settingsMenu);

            settingsBtn.addEventListener("click", event => {
                event.stopPropagation();
                settingsMenu.style.display = settingsMenu.style.display === "block" ? "none" : "block";
                const rect = settingsBtn.getBoundingClientRect();
                settingsMenu.style.top = rect.bottom + "px";
                settingsMenu.style.left = (rect.left - 160) + "px";
            });

            document.addEventListener("click", () => { settingsMenu.style.display = "none"; });
            settingsMenu.addEventListener("click", event => event.stopPropagation());

            const toggleMuteItem = document.getElementById("toggle-mute");
            const volumeSlider = document.getElementById("volume-slider");

            toggleMuteItem.addEventListener("click", () => {
                isMuted = !isMuted;
                if (isMuted) { audioFeedback.volume = 0; volumeSlider.value = 0; }
                else { audioFeedback.volume = 1; volumeSlider.value = 1; }
                toggleMuteItem.textContent = isMuted ? "🔇 <Unmute>" : "🔊 Mute";
                localStorage.setItem("soundVolume", audioFeedback.volume);
            });

            const savedVolume = localStorage.getItem("soundVolume");
            if (savedVolume !== null) {
                audioFeedback.volume = savedVolume;
                volumeSlider.value = savedVolume;
                if (savedVolume == 0) { isMuted = true; toggleMuteItem.textContent = "🔇 <Unmute>"; }
            }

            volumeSlider.addEventListener("input", () => {
                const vol = volumeSlider.value;
                audioFeedback.volume = vol;
                if (vol == 0) { isMuted = true; toggleMuteItem.textContent = "🔇 <Unmute>"; }
                else { isMuted = false; toggleMuteItem.textContent = "🔊 Mute"; }
                localStorage.setItem("soundVolume", vol);
            });

            const soundUploadInput = document.getElementById("sound-upload");
            const removeSoundBtn = document.getElementById("remove-sound");

            soundUploadInput.addEventListener("change", event => {
                const file = event.target.files[0];
                if (!file) return;
                if (file.size > 4194304) {
                    alert("El archivo supera el tamaño permitido de 4MB");
                    soundUploadInput.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function (evt) {
                    audioFeedback.src = evt.target.result;
                    localStorage.setItem("customSound", evt.target.result);
                };
                reader.readAsDataURL(file);
            });

            removeSoundBtn.addEventListener("click", () => {
                localStorage.removeItem("customSound");
                audioFeedback.src = defaultSoundPath;
            });

            const organizedTrigger = document.getElementById("organized-trigger");
            const organizedOptions = document.getElementById("organized-options");
            organizedTrigger.addEventListener("click", event => {
                event.stopPropagation();
                organizedOptions.style.display = organizedOptions.style.display === "block" ? "none" : "block";
            });

            organizedOptions.querySelectorAll("li").forEach(li => {
                li.addEventListener("click", event => {
                    event.stopPropagation();
                    settingsMenu.style.display = "none";
                    triggerOrganizeWorkflow(li.dataset.action);
                });
            });

            const bgSettingsTrigger = document.getElementById("background-settings");
            const bgOptionsList = document.getElementById("background-options");
            bgSettingsTrigger.addEventListener("click", event => {
                event.stopPropagation();
                bgOptionsList.style.display = bgOptionsList.style.display === "block" ? "none" : "block";
            });

            bgOptionsList.querySelectorAll("li").forEach(li => {
                li.addEventListener("click", event => {
                    event.stopPropagation();
                    const bgValue = li.dataset.bg;
                    document.body.style.background = bgValue;
                    document.body.style.backgroundAttachment = "fixed";
                    localStorage.setItem("selectedBackground", bgValue);
                    settingsMenu.style.display = "none";
                });
            });

            // Gestión de Espacios de Trabajo (Boards) y Persistencia
            function migrateLegacyData() {
                const boxesLegacy = localStorage.getItem("boxes");
                const lineBoxesLegacy = localStorage.getItem("lineBoxes");
                if (boxesLegacy && !localStorage.getItem("boxes_b1")) {
                    localStorage.setItem("boxes_b1", boxesLegacy);
                    localStorage.removeItem("boxes");
                }
                if (lineBoxesLegacy && !localStorage.getItem("lineBoxes_b1")) {
                    localStorage.setItem("lineBoxes_b1", lineBoxesLegacy);
                    localStorage.removeItem("lineBoxes");
                }
            }

            function getNextAvailableBoardId() {
                for (let i = 1; i <= 3; i++) {
                    if (!boardsList.includes(i)) return i;
                }
                return null;
            }

            function renderBoardsTabs() {
                boardsContainer.innerHTML = "";
                boardsList.sort((a, b) => a - b);
                boardsList.forEach(id => {
                    const tab = document.createElement("div");
                    tab.classList.add("board-tab");
                    if (id === activeBoardId) tab.classList.add("active");
                    tab.textContent = `Board ${id}`;
                    if (id !== 1) {
                        const closeBtn = document.createElement("button");
                        closeBtn.classList.add("close-board-btn");
                        closeBtn.textContent = "×";
                        closeBtn.addEventListener("click", event => {
                            event.stopPropagation();
                            deleteBoardWorkflow(id, tab);
                        });
                        tab.appendChild(closeBtn);
                    }
                    tab.addEventListener("click", () => {
                        if (activeBoardId !== id) switchActiveBoard(id);
                    });
                    boardsContainer.appendChild(tab);
                });
                addBoardBtn.disabled = boardsList.length >= 3;
            }

            function switchActiveBoard(id) {
                activeBoardId = id;
                localStorage.setItem("activeBoardId", activeBoardId);
                workspace.innerHTML = "";
                loadBoxes();
                loadLineBoxes();
                renderBoardsTabs();
                initColorPresetsGrid();
                contentArea.scrollTop = 0;
                contentArea.scrollLeft = 0;
            }

            addBoardBtn.addEventListener("click", () => {
                if (boardsList.length >= 3) return;
                const nextId = getNextAvailableBoardId();
                if (nextId) {
                    boardsList.push(nextId);
                    localStorage.setItem("boardsList", JSON.stringify(boardsList));
                    switchActiveBoard(nextId);
                }
            });

            // Sistema Único de Modales de Confirmación
            let currentConfirmCallback = null;
            let backdropLayer = null;

            function deleteBoardWorkflow(id, tabElement) {
                setupModalBackdrop();
                customConfirmModal.classList.remove("pulse-danger");
                document.getElementById("confirm-title").textContent = `¿Eliminar Board ${id}?`;
                document.getElementById("confirm-msg").textContent = "Todos los recuadros guardados en este espacio desaparecerán para siempre.";
                confirmYesBtn.classList.add("danger");
                confirmYesBtn.textContent = "Eliminar";
                backdropLayer.classList.add("active");
                customConfirmModal.classList.add("active");

                currentConfirmCallback = () => {
                    customConfirmModal.classList.add("pulse-danger");
                    document.getElementById("confirm-title").textContent = "¿Estás absolutamente seguro?";
                    document.getElementById("confirm-msg").textContent = "Confirma una vez más. Esta acción borrará irreversiblemente los datos de este Board.";
                    confirmYesBtn.textContent = "Sí, borrar todo";
                    currentConfirmCallback = () => {
                        const width = tabElement.offsetWidth;
                        tabElement.style.setProperty("--tab-width", `${width}px`);
                        tabElement.classList.add("animation-exit");
                        tabElement.addEventListener("animationend", () => {
                            boardsList = boardsList.filter(b => b !== id);
                            localStorage.setItem("boardsList", JSON.stringify(boardsList));
                            localStorage.removeItem(`boxes_b${id}`);
                            localStorage.removeItem(`lineBoxes_b${id}`);
                            if (activeBoardId === id) {
                                activeBoardId = boardsList[0];
                                localStorage.setItem("activeBoardId", activeBoardId);
                            }
                            workspace.innerHTML = "";
                            loadBoxes();
                            loadLineBoxes();
                            renderBoardsTabs();
                        }, { once: true });
                        closeConfirmModal();
                    };
                };
            }

            function deleteBoxWorkflow(element, type, saveCallback) {
                setupModalBackdrop();
                customConfirmModal.classList.add("pulse-danger");
                document.getElementById("confirm-title").textContent = `¿Eliminar este ${type}?`;
                document.getElementById("confirm-msg").textContent = "Esta acción quitará el recuadro de tu espacio de trabajo de forma inmediata.";
                confirmYesBtn.classList.add("danger");
                confirmYesBtn.textContent = "Eliminar";
                backdropLayer.classList.add("active");
                customConfirmModal.classList.add("active");

                currentConfirmCallback = () => {
                    workspace.removeChild(element);
                    saveCallback();
                    closeConfirmModal();
                };
            }

            function triggerOrganizeWorkflow(action) {
                setupModalBackdrop();
                customConfirmModal.classList.remove("pulse-danger");
                confirmYesBtn.classList.remove("danger");
                confirmYesBtn.textContent = "Yes";
                let title = "", desc = "This action will arrange elements automatically.";
                if (action === "template") title = "Organize template boxes?";
                if (action === "color") title = "Organize color boxes?";
                if (action === "empty") title = "Organize empty blank boxes?";
                document.getElementById("confirm-title").textContent = title;
                document.getElementById("confirm-msg").textContent = desc;
                backdropLayer.classList.add("active");
                customConfirmModal.classList.add("active");

                currentConfirmCallback = () => {
                    document.getElementById("confirm-title").textContent = "Please confirm you want to organize";
                    document.getElementById("confirm-msg").textContent = "Are you absolutely sure?";
                    currentConfirmCallback = () => {
                        executeLayoutOrganization(action);
                        closeConfirmModal();
                    };
                };
            }

            function setupModalBackdrop() {
                if (!backdropLayer) {
                    backdropLayer = document.createElement("div");
                    backdropLayer.classList.add("color-picker-backdrop");
                    document.body.appendChild(backdropLayer);
                    backdropLayer.addEventListener("click", closeConfirmModal);
                }
            }

            confirmYesBtn.addEventListener("click", () => { if (currentConfirmCallback) currentConfirmCallback(); });
            confirmNoBtn.addEventListener("click", closeConfirmModal);

            function closeConfirmModal() {
                if (backdropLayer) backdropLayer.classList.remove("active");
                customConfirmModal.classList.remove("active");
                customConfirmModal.classList.remove("pulse-danger");
                currentConfirmCallback = null;
            }

            function executeLayoutOrganization(action) {
                let list = [];
                if (action === "template") {
                    list = Array.from(workspace.querySelectorAll(".box"));
                } else if (action === "color") {
                    list = Array.from(workspace.querySelectorAll(".line-box"));
                } else if (action === "empty") {
                    list = Array.from(workspace.querySelectorAll(".box")).filter(b => b.querySelector("textarea").value.trim() === "");
                }

                if (list.length === 0) return;
                const startX = 40, startY = 40, gapX = 30, gapY = 30;
                const maxW = workspace.clientWidth || window.innerWidth;
                let currentX = startX, currentY = startY, maxHeightInRow = 0;

                list.forEach(item => {
                    const rect = item.getBoundingClientRect();
                    const w = rect.width || (item.classList.contains("box") ? 300 : 260);
                    const h = rect.height || 120;
                    if (currentX + w > maxW - 40 && currentX > startX) {
                        currentX = startX;
                        currentY += maxHeightInRow + gapY;
                        maxHeightInRow = 0;
                    }
                    item.style.left = `${currentX}px`;
                    item.style.top = `${currentY}px`;
                    currentX += w + gapX;
                    if (h > maxHeightInRow) maxHeightInRow = h;
                });
                saveBoxes();
                saveLineBoxes();
            }

            // Construcción y Comportamiento Dinámico de Cajas (Boxes / LineBoxes)
            addBoxBtn.addEventListener("click", () => {
                const sTop = contentArea.scrollTop, sLeft = contentArea.scrollLeft;
                createBox({ text: "", left: `${sLeft + 50}px`, top: `${sTop + 150}px`, locked: "false" });
                saveBoxes();
            });

            addLineBoxBtn.addEventListener("click", () => {
                const sTop = contentArea.scrollTop, sLeft = contentArea.scrollLeft;
                createLineBox({ text: "", left: `${sLeft + 50}px`, top: `${sTop + 150}px`, color: "#ffffff", locked: "false" });
                saveLineBoxes();
            });

            function createBox(data) {
                const box = document.createElement("div");
                box.classList.add("box");
                box.style.left = data.left;
                box.style.top = data.top;

                const textarea = document.createElement("textarea");
                textarea.placeholder = "Texto...";
                textarea.value = data.text;
                box.dataset.locked = data.locked || "false";

                textarea.addEventListener("input", () => {
                    textarea.style.height = "auto";
                    textarea.style.height = `${textarea.scrollHeight}px`;
                    saveBoxes();
                });

                const buttonsDiv = document.createElement("div");
                buttonsDiv.classList.add("box-buttons");

                const copyBtn = document.createElement("button");
                copyBtn.classList.add("copy-btn");
                copyBtn.textContent = "+";
                copyBtn.addEventListener("click", () => {
                    navigator.clipboard.writeText(textarea.value);
                    if (!isMuted) {
                        audioFeedback.currentTime = 0;
                        audioFeedback.play().catch(err => console.log("Audio feedback error:", err));
                    }
                    box.classList.remove("glow");
                    void box.offsetWidth;
                    box.classList.add("glow");
                });

                const lockBtn = document.createElement("button");
                lockBtn.classList.add("lock-btn");
                lockBtn.textContent = "🔒";
                lockBtn.addEventListener("click", event => {
                    event.stopPropagation();
                    const state = box.dataset.locked === "true";
                    box.dataset.locked = !state;
                    if (!state) { box.classList.add("locked"); lockBtn.classList.add("active"); }
                    else { box.classList.remove("locked"); lockBtn.classList.remove("active"); }
                    saveBoxes();
                });

                const deleteBtn = document.createElement("button");
                deleteBtn.classList.add("delete-btn");
                deleteBtn.textContent = "-";
                deleteBtn.addEventListener("click", () => { deleteBoxWorkflow(box, "recuadro", saveBoxes); });

                buttonsDiv.appendChild(copyBtn);
                buttonsDiv.appendChild(lockBtn);
                buttonsDiv.appendChild(deleteBtn);
                box.appendChild(textarea);
                box.appendChild(buttonsDiv);
                workspace.appendChild(box);

                if (box.dataset.locked === "true") { box.classList.add("locked"); lockBtn.classList.add("active"); }
                textarea.style.height = `${textarea.scrollHeight}px`;
                attachDragBehavior(box);
            }

            function createLineBox(data) {
                const box = document.createElement("div");
                box.classList.add("line-box");
                box.style.left = data.left;
                box.style.top = data.top;
                box.style.backgroundColor = data.color;
                box.dataset.locked = data.locked || "false";
                if (data.locked === "true") box.classList.add("locked");

                const textarea = document.createElement("textarea");
                textarea.placeholder = "Texto...";
                textarea.value = data.text || "";
                textarea.setAttribute("value", data.text || "");

                textarea.addEventListener("mousedown", event => event.stopPropagation());
                textarea.addEventListener("touchstart", event => event.stopPropagation());
                textarea.addEventListener("input", () => {
                    textarea.setAttribute("value", textarea.value);
                    saveLineBoxes();
                });

                const buttonsDiv = document.createElement("div");
                buttonsDiv.classList.add("line-box-buttons");

                const colorBtn = document.createElement("button");
                colorBtn.classList.add("color-btn");
                colorBtn.textContent = "🎨";
                colorBtn.addEventListener("click", event => {
                    event.stopPropagation();
                    activeLineBox = box;
                    openColorPickerLayout(colorBtn);
                });

                const lockBtn = document.createElement("button");
                lockBtn.classList.add("lock-btn");
                lockBtn.textContent = "🔒";
                if (data.locked === "true") lockBtn.classList.add("active");
                lockBtn.addEventListener("click", event => {
                    event.stopPropagation();
                    const state = box.dataset.locked === "true";
                    box.dataset.locked = !state;
                    if (!state) { box.classList.add("locked"); lockBtn.classList.add("active"); }
                    else { box.classList.remove("locked"); lockBtn.classList.remove("active"); }
                    saveLineBoxes();
                });

                const deleteBtn = document.createElement("button");
                deleteBtn.classList.add("delete-btn");
                deleteBtn.textContent = "X";
                deleteBtn.addEventListener("click", event => {
                    event.stopPropagation();
                    deleteBoxWorkflow(box, "LineBox", saveLineBoxes);
                });

                buttonsDiv.appendChild(colorBtn);
                buttonsDiv.appendChild(lockBtn);
                buttonsDiv.appendChild(deleteBtn);
                box.appendChild(textarea);
                box.appendChild(buttonsDiv);
                workspace.appendChild(box);
                attachDragBehavior(box);
            }

            function attachDragBehavior(element) {
                let startX, startY;
                const dragHandler = (clientX, clientY, target) => {
                    if (target.tagName === "TEXTAREA" || target.tagName === "BUTTON" || element.classList.contains("locked")) return;
                    startX = clientX - element.offsetLeft;
                    startY = clientY - element.offsetTop;

                    const onMove = (moveX, moveY) => {
                        let nx = moveX - startX, ny = moveY - startY;
                        if (nx < 10) nx = 10; if (ny < 10) ny = 10;
                        if (nx > 2650) nx = 2650; if (ny > 2850) ny = 2850;
                        element.style.left = `${nx}px`;
                        element.style.top = `${ny}px`;
                    };
                    const onMouseMove = event => onMove(event.clientX, event.clientY);
                    const onTouchMove = event => {
                        if (event.touches.length > 0) onMove(event.touches[0].clientX, event.touches[0].clientY);
                    };

                    const onRelease = () => {
                        document.removeEventListener("mousemove", onMouseMove);
                        document.removeEventListener("touchmove", onTouchMove);
                        if (element.classList.contains("box")) { saveBoxes(); } else { saveLineBoxes(); }
                    };

                    document.addEventListener("mousemove", onMouseMove);
                    document.addEventListener("touchmove", onTouchMove, { passive: false });
                    document.addEventListener("mouseup", onRelease, { once: true });
                    document.addEventListener("touchend", onRelease, { once: true });
                };

                element.addEventListener("mousedown", event => dragHandler(event.clientX, event.clientY, event.target));
                element.addEventListener("touchstart", event => {
                    if (event.touches.length > 0) dragHandler(event.touches[0].clientX, event.touches[0].clientY, event.target);
                }, { passive: true });
            }

            // Sistema Global de Paletas de Colores (Presets / Custom)
            let colorPickerBackdrop = null;
            const customPresets = ["#ffffff", "#f7fafc", "#edf2f7", "#e2e8f0", "#cbd5e0", "#feb2b2", "#fbd38d", "#faf089", "#9ae6b4", "#9decf9", "#fc8181", "#f6ad55", "#f6e05e", "#68d391", "#4fd1c5", "#f56565", "#ed8936", "#ecc94b", "#48bb78", "#38b2ac", "#e53e3e", "#dd6b20", "#d69e2e", "#38a169", "#319795"];

            function initColorPresetsGrid() {
                colorPresetsGrid.innerHTML = "";
                customPresets.forEach(color => {
                    const circle = document.createElement("div");
                    circle.classList.add("color-preset-circle");
                    circle.style.backgroundColor = color;
                    circle.addEventListener("click", () => {
                        updateActiveLineBoxColor(color);
                        closeColorPickerLayout();
                    });
                    colorPresetsGrid.appendChild(circle);
                });
            }

            function openColorPickerLayout(triggerBtn) {
                if (!colorPickerBackdrop) {
                    colorPickerBackdrop = document.createElement("div");
                    colorPickerBackdrop.classList.add("color-picker-backdrop");
                    document.body.appendChild(colorPickerBackdrop);
                    colorPickerBackdrop.addEventListener("click", closeColorPickerLayout);
                }
                const parentBox = triggerBtn.closest(".line-box");
                const leftPos = parseInt(parentBox.style.left);
                const topPos = parseInt(parentBox.style.top);
                colorPicker.style.left = `${leftPos}px`;
                colorPicker.style.top = `${topPos + 45}px`;
                colorPickerBackdrop.classList.add("active");
                colorPicker.classList.add("active");
            }

            function closeColorPickerLayout() {
                if (colorPickerBackdrop) colorPickerBackdrop.classList.remove("active");
                colorPicker.classList.remove("active");
            }

            closeColorPickerBtn.addEventListener("click", closeColorPickerLayout);
            customColorInput.addEventListener("input", () => { updateActiveLineBoxColor(customColorInput.value); });

            function updateActiveLineBoxColor(color) {
                if (!activeLineBox) return;
                activeLineBox.style.backgroundColor = color;
                activeLineBox.querySelector("textarea").style.backgroundColor = color;
                colorPreview.style.backgroundColor = color;
                saveLineBoxes();
            }

            // Funciones de Guardado y Carga Explícitas
            function saveBoxes() {
                const boxes = Array.from(workspace.querySelectorAll('.box')).map(box => ({
                    text: box.querySelector('textarea').value,
                    left: box.style.left,
                    top: box.style.top,
                    locked: box.dataset.locked
                }));
                localStorage.setItem(`boxes_b${activeBoardId}`, JSON.stringify(boxes));
            }

            function loadBoxes() {
                const savedBoxes = JSON.parse(localStorage.getItem(`boxes_b${activeBoardId}`) || '[]');
                savedBoxes.forEach(data => createBox(data));
            }

            function saveLineBoxes() {
                const lineBoxes = Array.from(workspace.querySelectorAll('.line-box')).map(box => ({
                    text: box.querySelector('textarea').value,
                    left: box.style.left,
                    top: box.style.top,
                    color: box.style.backgroundColor,
                    locked: box.dataset.locked
                }));
                localStorage.setItem(`lineBoxes_b${activeBoardId}`, JSON.stringify(lineBoxes));
            }

            function loadLineBoxes() {
                const savedLineBoxes = JSON.parse(localStorage.getItem(`lineBoxes_b${activeBoardId}`) || '[]');
                savedLineBoxes.forEach(data => createLineBox(data));
            }

            // Inicialización de la Aplicación
            document.addEventListener("DOMContentLoaded", () => {
                const savedBg = localStorage.getItem("selectedBackground");
                if (savedBg) {
                    document.body.style.background = savedBg;
                    document.body.style.backgroundAttachment = "fixed";
                }
                migrateLegacyData();

                const savedBoards = localStorage.getItem("boardsList");
                const savedActiveBoard = localStorage.getItem("activeBoardId");
                if (savedBoards) boardsList = JSON.parse(savedBoards);
                if (savedActiveBoard && boardsList.includes(parseInt(savedActiveBoard))) {
                    activeBoardId = parseInt(savedActiveBoard);
                } else {
                    activeBoardId = boardsList[0] || 1;
                }

                initSidebarState();
                renderBoardsTabs();
                loadBoxes();
                loadLineBoxes();
                initColorPresetsGrid();
            });
        })();
    </script>
</body>

</html>
